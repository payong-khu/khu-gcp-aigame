<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI vs Human</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    text-align: center;
    padding: 60px 40px;
    max-width: 560px;
  }

  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 28px;
    color: #a8b2d8;
  }

  h1 {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #e0c3fc, #8ec5fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    color: #8892b0;
    line-height: 1.8;
    margin: 20px 0 40px;
  }

  .start-btn {
    display: inline-block;
    padding: 16px 48px;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(102,126,234,0.4);
  }

  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(102,126,234,0.6);
  }
</style>
</head>
<body>
<div class="container">
  <div class="badge">경희대학교 세계와 시민 GCP</div>
  <h1>AI vs Human</h1>
  <p class="subtitle">
    AI가 만든 이미지를 구별하며<br>
    비판적 사고와 AI 리터러시를 길러보세요.
  </p>
  <button class="start-btn" onclick="startGame()">게임 시작하기</button>
</div>

<script>
function startGame() {
  localStorage.setItem("round", 1);
  localStorage.setItem("score", 0);
  localStorage.setItem("infinite", "false");
  location.href = "/game";
}
</script>
</body>
</html>
