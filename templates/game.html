<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI vs Human</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 40px;
  }

  .top-bar {
    width: 100%;
    max-width: 540px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .round-info { font-size: 14px; color: #a8b2d8; }
  .score-info { font-size: 14px; color: #a8b2d8; }
  .mode-badge {
    font-size: 11px;
    font-weight: 700;
    background: linear-gradient(135deg, #f6c90e, #f97316);
    color: #1a1a2e;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #e0c3fc;
    text-align: center;
  }

  .image-wrap {
    width: 100%;
    max-width: 440px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    margin-bottom: 24px;
    position: relative;
  }
  .image-wrap img {
    width: 100%;
    display: block;
    image-orientation: none; /* EXIF 무시하고 원본 그대로 */
  }

  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    border-radius: 16px;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: 900;
  }
  .overlay.correct   { background: rgba(34,197,94,0.55);  color: #fff; display: flex; }
  .overlay.incorrect { background: rgba(239,68,68,0.55);  color: #fff; display: flex; }

  .btn-group { display: flex; gap: 14px; margin-bottom: 20px; }
  .btn {
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-ai    { background: linear-gradient(135deg, #667eea, #764ba2); color: white; box-shadow: 0 6px 24px rgba(102,126,234,0.4); }
  .btn-human { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; box-shadow: 0 6px 24px rgba(245,87,108,0.4); }
  .btn:hover    { transform: translateY(-2px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .next-btn {
    display: none;
    padding: 12px 40px;
    font-size: 15px;
    font-weight: 700;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    border-radius: 50px;
    cursor: pointer;
    margin-bottom: 20px;
    transition: background 0.2s;
  }
  .next-btn:hover { background: rgba(255,255,255,0.2); }

  .tip-section {
    width: 100%;
    max-width: 540px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px 22px;
    margin-top: 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .tip-icon  { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .tip-label { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #f6c90e; margin-bottom: 4px; }
  .tip-text  { font-size: 13px; color: #c8d0e7; line-height: 1.6; }
</style>
</head>
<body>

<div class="top-bar">
  <span class="round-info">
    {% if continue_mode %}
      <span class="mode-badge">🔥 계속하기</span>&nbsp; 라운드 {{ current_round }}
    {% else %}
      라운드 {{ current_round }} / {{ total_rounds }}
    {% endif %}
  </span>
  <span class="score-info">점수 <span id="scoreNum">{{ current_score }}</span></span>
</div>

<h2>이 이미지는 AI가 만든 것일까요?</h2>

<div class="image-wrap">
  <img src="/static/images/{{ image.file }}" alt="퀴즈 이미지">
  <div class="overlay" id="overlay"></div>
</div>

<div class="btn-group" id="btnGroup">
  <button class="btn btn-ai"    onclick="submitAnswer('AI')">🤖 AI 생성</button>
  <button class="btn btn-human" onclick="submitAnswer('HUMAN')">📷 실제 사진</button>
</div>

<button class="next-btn" id="nextBtn" onclick="nextRound()">다음 라운드 →</button>

<div class="tip-section">
  <div class="tip-icon">💡</div>
  <div>
    <div class="tip-label">Tip</div>
    <div class="tip-text" id="tipText"></div>
  </div>
</div>

<script>
  const imageData    = {{ image | tojson }};
  const continueMode = {{ 'true' if continue_mode else 'false' }};

  const tips = [
    "손가락 개수를 확인해 보세요. AI는 손을 그리기 어려워 손가락이 6개이거나 뭉개진 경우가 많아요.",
    "이미지 속 간판이나 문자를 확인하세요. AI가 생성한 텍스트는 알아보기 힘든 이상한 문자로 표현될 수 있어요.",
    "양쪽 귀·귀걸이·안경을 비교해 보세요. 좌우 모양이 다르거나 구조가 어색한 경우 AI일 가능성이 높아요.",
    "벽돌, 창문, 울타리 같은 반복 패턴이 불규칙하게 흐트러진다면 AI가 생성한 이미지일 수 있어요.",
    "피부와 머리카락의 경계를 살펴보세요. 지나치게 매끈하거나 경계가 흐릿하게 번지면 AI 이미지예요.",
    "조명, 피부, 구도가 너무 완벽하다면 의심해 보세요. 과도한 완벽함은 AI의 특징 중 하나예요.",
    "배경이 흐리거나 뭉개진 부분이 있나요? AI는 주요 피사체 외의 디테일을 종종 뭉개서 처리해요.",
    "눈의 반사광이 자연스러운지 확인하세요. AI 이미지는 눈빛이 비현실적으로 빛나는 경우가 있어요."
  ];
  document.getElementById("tipText").textContent = tips[Math.floor(Math.random() * tips.length)];

  let answered = false;

  function submitAnswer(answer) {
    if (answered) return;
    answered = true;
    document.querySelectorAll('.btn').forEach(b => b.disabled = true);

    fetch('/check', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ answer: answer, label: imageData.label })
    })
    .then(r => r.json())
    .then(data => {
      const overlay = document.getElementById('overlay');
      overlay.className = 'overlay ' + (data.is_correct ? 'correct' : 'incorrect');
      overlay.textContent = data.is_correct
        ? '✅ 정답!'
        : (data.correct_label === 'AI' ? '❌ AI 이미지였어요!' : '❌ 실제 사진이었어요!');

      // 서버 점수로 동기화
      document.getElementById("scoreNum").textContent = data.score;

      const nextBtn = document.getElementById('nextBtn');
      if (data.game_over) {
        nextBtn.textContent = '결과 보기 →';
        nextBtn.onclick = () => location.href = '/result';
      }
      nextBtn.style.display = 'inline-block';
    });
  }

  function nextRound() {
    location.href = '/game';
  }
</script>
</body>
</html>
